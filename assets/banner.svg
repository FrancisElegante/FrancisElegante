<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 240" width="1400" height="240" preserveAspectRatio="xMidYMid slice">
  <!-- ══════════════════════════════════════════════════════════════════════
       franciselegante — animated banner · v6 (no monument)
       Layout: status bar · prompt · tagline · code column · bottom meta
       Palette: Pegasuz Panel Fire + cyan + lime
       ═══════════════════════════════════════════════════════════════════════ -->

  <defs>
    <radialGradient id="bg" cx="15%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#180a00"/>
      <stop offset="40%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <linearGradient id="fireGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0000">
        <animate attributeName="stop-color"
          values="#ff0000;#ff5f00;#ff8700;#ffaf00;#ffd700;#ff8700;#ff0000"
          dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="33%" stop-color="#ff5f00">
        <animate attributeName="stop-color"
          values="#ff5f00;#ff8700;#ffaf00;#ffd700;#ff8700;#ff5f00;#ff0000;#ff5f00"
          dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="66%" stop-color="#ff8700">
        <animate attributeName="stop-color"
          values="#ff8700;#ffaf00;#ffd700;#ff8700;#ff5f00;#ff0000;#ff5f00;#ff8700"
          dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ffd700">
        <animate attributeName="stop-color"
          values="#ffd700;#ff8700;#ff5f00;#ff0000;#ff5f00;#ff8700;#ffaf00;#ffd700"
          dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="scanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="transparent"/>
      <rect y="2" width="4" height="1" fill="#ff5f00" fill-opacity="0.06"/>
    </pattern>

    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ff5f00" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>

    <clipPath id="revealClip">
      <rect x="0" y="0" width="0" height="240">
        <animate attributeName="width" values="0;1400" dur="1.8s" begin="0.3s"
          fill="freeze" calcMode="spline" keySplines="0.25 1 0.5 1"/>
      </rect>
    </clipPath>

    <style type="text/css">
      @keyframes scan-move {
        0%   { transform: translateY(-10px); }
        100% { transform: translateY(240px); }
      }
      @keyframes cursor-blink {
        0%, 49%   { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes char-flicker {
        0%, 97%, 100% { opacity: 0.5; }
        98%           { opacity: 0.2; }
        99%           { opacity: 0.6; }
      }
      @keyframes uptime-tick {
        0%   { opacity: 0.7; }
        50%  { opacity: 1; }
        100% { opacity: 0.7; }
      }
      @keyframes tagline-pulse {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.85; }
      }
      .prompt-mono {
        font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', 'Courier New', monospace;
        font-size: 34px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      .tagline-mono {
        font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', 'Courier New', monospace;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 3px;
      }
      .meta-line {
        font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', 'Courier New', monospace;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 1.8px;
      }
      .code-line {
        font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', 'Courier New', monospace;
        font-size: 11px;
        font-weight: 500;
      }
      .scan-overlay {
        animation: scan-move 3.5s linear infinite;
      }
      .cursor {
        animation: cursor-blink 1s steps(2, end) infinite;
      }
      .flicker {
        animation: char-flicker 5s steps(1, end) infinite;
      }
      .uptime-pulse {
        animation: uptime-tick 2s ease-in-out infinite;
      }
      .tagline-layer {
        animation: tagline-pulse 3s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- ── LAYER 0: canvas ────────────────────────────────────────────────── -->
  <rect width="1400" height="240" fill="url(#bg)"/>
  <rect width="1400" height="240" fill="url(#grid)"/>
  <rect width="1400" height="240" fill="url(#scanlines)"/>

  <!-- ── LAYER 1: atmospheric dots ──────────────────────────────────────── -->
  <g opacity="0.4">
    <circle cx="120" cy="40" r="1" fill="#ffd700"/>
    <circle cx="340" cy="60" r="1" fill="#ff5f00"/>
    <circle cx="680" cy="40" r="1" fill="#ff8700"/>
    <circle cx="950" cy="50" r="1" fill="#ffd700"/>
    <circle cx="200" cy="200" r="1" fill="#ff8700"/>
    <circle cx="560" cy="210" r="1" fill="#ffd700"/>
    <circle cx="860" cy="195" r="1" fill="#ff5f00"/>
    <circle cx="1100" cy="205" r="1" fill="#ff8700"/>
  </g>

  <!-- ── LAYER 2: top status bar ────────────────────────────────────────── -->
  <g transform="translate(30, 28)">
    <rect x="-2" y="-12" width="10" height="14" fill="#87ff00" opacity="0.9" class="uptime-pulse"/>
    <text x="18" y="-1" class="meta-line" fill="#87ff00">SYSTEM ONLINE</text>
    <text x="180" y="-1" class="meta-line" fill="#ff8700">UPTIME 99.97%</text>
    <text x="340" y="-1" class="meta-line" fill="#ffaf00">LOAD 0.54 0.26 0.20</text>
    <text x="570" y="-1" class="meta-line" fill="#5fffff">11 TENANTS LIVE</text>
    <text x="780" y="-1" class="meta-line" fill="#ffd700">MEM 28%</text>
    <text x="890" y="-1" class="meta-line" fill="#ff5f00">ACTIVE SESSION</text>
  </g>

  <!-- ── LAYER 3: main prompt line — the hero element ───────────────────── -->
  <g transform="translate(50, 115)" clip-path="url(#revealClip)">
    <text class="prompt-mono" fill="#87ff00">francis@server</text>
    <text x="298" class="prompt-mono" fill="#ffffff">:</text>
    <text x="314" class="prompt-mono" fill="#5fffff">~</text>
    <text x="340" class="prompt-mono" fill="#ffffff">$</text>
    <text x="370" class="prompt-mono" fill="url(#fireGrad)" filter="url(#glow)">./portfolio --init</text>
    <rect x="710" y="-28" width="18" height="34" fill="#ff5f00" class="cursor" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2s" fill="freeze"/>
    </rect>
  </g>

  <!-- ── LAYER 4: tagline below prompt — real titles ────────────────────── -->
  <g transform="translate(50, 162)" class="tagline-layer">
    <text class="tagline-mono" fill="#ffaf00" opacity="0">
      software engineer
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.2s" fill="freeze"/>
    </text>
    <text x="258" class="tagline-mono" fill="#5fffff" opacity="0">·
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.4s" fill="freeze"/>
    </text>
    <text x="282" class="tagline-mono" fill="#ff8700" opacity="0">software analyst
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.5s" fill="freeze"/>
    </text>
    <text x="528" class="tagline-mono" fill="#5fffff" opacity="0">·
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.7s" fill="freeze"/>
    </text>
    <text x="552" class="tagline-mono" fill="#ffd700" opacity="0">technician programmer
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.8s" fill="freeze"/>
    </text>
  </g>

  <!-- ── LAYER 5: moving scanline overlay ───────────────────────────────── -->
  <g class="scan-overlay" opacity="0.7">
    <line x1="0" y1="0" x2="1400" y2="0" stroke="#ff5f00" stroke-width="1" opacity="0.35"/>
    <line x1="0" y1="2" x2="1400" y2="2" stroke="#ff8700" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="5" x2="1400" y2="5" stroke="#ffaf00" stroke-width="1" opacity="0.1"/>
  </g>

  <!-- ── LAYER 6: right-side decorative code column ─────────────────────── -->
  <g transform="translate(1080, 65)" class="flicker">
    <text x="0" y="0"   class="code-line" fill="#ff8700">const server = express()</text>
    <text x="0" y="18"  class="code-line" fill="#5fffff">app.use(clientResolver)</text>
    <text x="0" y="36"  class="code-line" fill="#87ff00">app.use(auth.middleware)</text>
    <text x="0" y="54"  class="code-line" fill="#ffaf00">app.use('/api', routes)</text>
    <text x="0" y="72"  class="code-line" fill="#ffd700">server.listen(3001)</text>
    <text x="0" y="90"  class="code-line" fill="#ff5f00">[✓] 11 tenants resolved</text>
    <text x="0" y="108" class="code-line" fill="#87ff00">[✓] schema parity OK</text>
    <text x="0" y="126" class="code-line" fill="#5fffff">[✓] PM2 online</text>
  </g>

  <!-- ── LAYER 7: bottom status bar ─────────────────────────────────────── -->
  <g transform="translate(40, 222)">
    <text class="meta-line" fill="#5fffff">[SESSION]</text>
    <text x="90" class="meta-line" fill="#ffffff">francis@vps-5767070</text>
    <text x="290" class="meta-line" fill="#5fffff">[SHELL]</text>
    <text x="360" class="meta-line" fill="#ffffff">zsh 5.8</text>
    <text x="450" class="meta-line" fill="#5fffff">[EDITOR]</text>
    <text x="525" class="meta-line" fill="#ffffff">nvim</text>
    <text x="590" class="meta-line" fill="#5fffff">[TZ]</text>
    <text x="625" class="meta-line" fill="#ffffff">UTC-3</text>
    <text x="695" class="meta-line" fill="#5fffff">[STACK]</text>
    <text x="762" class="meta-line" fill="#ffffff">node · python · mysql · redis · nginx · pm2</text>
  </g>

  <!-- ── LAYER 8: top-right PROD indicator ──────────────────────────────── -->
  <g transform="translate(1280, 28)">
    <rect x="0" y="-12" width="90" height="18" fill="#ff5f00" opacity="0.15" stroke="#ff5f00" stroke-width="1"/>
    <text x="8" y="-1" class="meta-line" fill="#ff5f00">● PROD</text>
  </g>

  <!-- ── LAYER 9: edge accents ──────────────────────────────────────────── -->
  <rect x="0" y="0" width="4" height="240" fill="url(#fireGrad)"/>
  <rect x="0" y="236" width="1400" height="4" fill="url(#fireGrad)" opacity="0.7"/>
</svg>
