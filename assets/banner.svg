<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 360" width="1400" height="360" preserveAspectRatio="xMidYMid slice">
  <!-- ══════════════════════════════════════════════════════════════════════
       franciselegante — animated banner · v5
       Palette: Pegasuz Panel Fire (ff0000 · ff5f00 · ff8700 · ffaf00 · ffd700)
       Accents: 5fffff cyan · 87ff00 lime
       Typography: Orbitron / JetBrains Mono / Bebas Neue / Impact (fallback)
       ═══════════════════════════════════════════════════════════════════════ -->

  <defs>
    <!-- Google Fonts import — cargado si el navegador lo permite -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;family=JetBrains+Mono:wght@800&amp;family=Bebas+Neue&amp;display=swap');
    </style>

    <!-- Canvas: deep black with subtle radial warmth top-left -->
    <radialGradient id="bg" cx="15%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#180a00"/>
      <stop offset="40%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Fire gradient — animated cycling -->
    <linearGradient id="fireGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0000">
        <animate attributeName="stop-color"
          values="#ff0000;#ff5f00;#ff8700;#ffaf00;#ffd700;#ff8700;#ff0000"
          dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="33%" stop-color="#ff5f00">
        <animate attributeName="stop-color"
          values="#ff5f00;#ff8700;#ffaf00;#ffd700;#ff8700;#ff5f00;#ff0000;#ff5f00"
          dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="66%" stop-color="#ff8700">
        <animate attributeName="stop-color"
          values="#ff8700;#ffaf00;#ffd700;#ff8700;#ff5f00;#ff0000;#ff5f00;#ff8700"
          dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ffd700">
        <animate attributeName="stop-color"
          values="#ffd700;#ff8700;#ff5f00;#ff0000;#ff5f00;#ff8700;#ffaf00;#ffd700"
          dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Vertical fire for top highlight -->
    <linearGradient id="fireVert" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ff8700"/>
      <stop offset="100%" stop-color="#ff0000"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowBig" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowMassive" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="transparent"/>
      <rect y="2" width="4" height="1" fill="#ff5f00" fill-opacity="0.06"/>
    </pattern>

    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ff5f00" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>

    <!-- Dense hatch behind text for industrial feel -->
    <pattern id="hatch" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#ff8700" stroke-width="0.5" stroke-opacity="0.12"/>
    </pattern>

    <!-- Text reveal clip -->
    <clipPath id="textReveal">
      <rect x="0" y="0" width="0" height="360">
        <animate attributeName="width"
          values="0;1400"
          dur="1.8s"
          begin="0.3s"
          fill="freeze"
          calcMode="spline"
          keySplines="0.25 1 0.5 1"/>
      </rect>
    </clipPath>

    <style type="text/css">
      /* Keyframe animations — work in most SVG viewers including GitHub-rendered */
      @keyframes pulse-glow {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.82; }
      }
      @keyframes scan-move {
        0%   { transform: translateY(-10px); }
        100% { transform: translateY(360px); }
      }
      @keyframes cursor-blink {
        0%, 49%   { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes char-flicker {
        0%, 97%, 100% { opacity: 0.45; }
        98%           { opacity: 0.15; }
        99%           { opacity: 0.55; }
      }
      @keyframes uptime-tick {
        0%   { opacity: 0.7; }
        50%  { opacity: 1; }
        100% { opacity: 0.7; }
      }
      @keyframes glitch-shift {
        0%, 90%, 100% { transform: translate(0, 0); }
        92%           { transform: translate(-2px, 1px); }
        94%           { transform: translate(2px, -1px); }
        96%           { transform: translate(-1px, 0); }
        98%           { transform: translate(1px, 0); }
      }
      @keyframes glitch-red {
        0%, 93%, 100% { transform: translate(-2px, 0); opacity: 0.6; }
        94%           { transform: translate(-6px, 1px); opacity: 0.9; }
        96%           { transform: translate(-1px, -1px); opacity: 0.4; }
      }
      @keyframes glitch-cyan {
        0%, 94%, 100% { transform: translate(2px, 0); opacity: 0.5; }
        95%           { transform: translate(6px, -1px); opacity: 0.8; }
        97%           { transform: translate(1px, 1px); opacity: 0.35; }
      }

      /* Monument typography stack — tries Orbitron (900), JetBrains Mono (800), Bebas Neue, falls back to Impact */
      .monument {
        font-family: 'Orbitron', 'JetBrains Mono', 'Bebas Neue', 'Impact', 'Arial Black', sans-serif;
        font-weight: 900;
        font-size: 132px;
        letter-spacing: -2px;
      }
      .monument-condensed {
        font-family: 'Bebas Neue', 'Impact', 'Arial Black', sans-serif;
        font-weight: 400;
        font-size: 172px;
        letter-spacing: 4px;
      }
      .layer-main {
        animation: pulse-glow 3.5s ease-in-out infinite, glitch-shift 7s linear infinite;
      }
      .layer-red {
        animation: glitch-red 7s linear infinite;
      }
      .layer-cyan {
        animation: glitch-cyan 7s linear infinite;
      }
      .scan-overlay {
        animation: scan-move 3.5s linear infinite;
      }
      .cursor {
        animation: cursor-blink 1s steps(2, end) infinite;
      }
      .flicker {
        animation: char-flicker 5s steps(1, end) infinite;
      }
      .uptime-pulse {
        animation: uptime-tick 2s ease-in-out infinite;
      }

      .prompt {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 1px;
      }
      .tagline {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-size: 20px;
        font-weight: 500;
        letter-spacing: 2.5px;
      }
      .meta-line {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 1.8px;
      }
      .code-line {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-size: 11px;
        font-weight: 500;
      }
    </style>
  </defs>

  <!-- ── LAYER 0: canvas ────────────────────────────────────────────────── -->
  <rect width="1400" height="360" fill="url(#bg)"/>
  <rect width="1400" height="360" fill="url(#grid)"/>
  <rect width="1400" height="360" fill="url(#scanlines)"/>

  <!-- ── LAYER 1: atmospheric dots ──────────────────────────────────────── -->
  <g opacity="0.35">
    <circle cx="120" cy="80" r="1" fill="#ffd700"/>
    <circle cx="340" cy="40" r="1" fill="#ff5f00"/>
    <circle cx="680" cy="60" r="1" fill="#ff8700"/>
    <circle cx="950" cy="30" r="1" fill="#ffd700"/>
    <circle cx="1200" cy="50" r="1" fill="#ff5f00"/>
    <circle cx="200" cy="310" r="1" fill="#ff8700"/>
    <circle cx="560" cy="330" r="1" fill="#ffd700"/>
    <circle cx="860" cy="300" r="1" fill="#ff5f00"/>
    <circle cx="1100" cy="320" r="1" fill="#ff8700"/>
    <circle cx="60" cy="180" r="1" fill="#ffd700"/>
    <circle cx="1340" cy="200" r="1" fill="#ff5f00"/>
  </g>

  <!-- ── LAYER 2: top status line ───────────────────────────────────────── -->
  <g transform="translate(30, 30)">
    <rect x="-2" y="-14" width="10" height="14" fill="#87ff00" opacity="0.9" class="uptime-pulse"/>
    <text x="18" y="-1" class="meta-line" fill="#87ff00">SYSTEM ONLINE</text>
    <text x="180" y="-1" class="meta-line" fill="#ff8700">UPTIME 99.97%</text>
    <text x="340" y="-1" class="meta-line" fill="#ffaf00">LOAD 0.54 0.26 0.20</text>
    <text x="570" y="-1" class="meta-line" fill="#5fffff">11 TENANTS LIVE</text>
    <text x="780" y="-1" class="meta-line" fill="#ffd700">MEM 28%</text>
    <text x="890" y="-1" class="meta-line" fill="#ff5f00">ACTIVE SESSION</text>
  </g>

  <!-- ── LAYER 3: prompt line above main text ───────────────────────────── -->
  <g transform="translate(40, 100)">
    <text class="prompt" fill="#87ff00">francis@server</text>
    <text x="175" class="prompt" fill="#ffffff">:</text>
    <text x="185" class="prompt" fill="#5fffff">~</text>
    <text x="202" class="prompt" fill="#ffffff">$</text>
    <text x="222" class="prompt" fill="#ff8700">./portfolio --init</text>
  </g>

  <!-- ── LAYER 4: HATCH BACKGROUND behind the name (industrial panel) ──── -->
  <rect x="20" y="130" width="1100" height="120" fill="url(#hatch)" opacity="0.8"/>

  <!-- ── LAYER 5: MASSIVE NAME TEXT · multi-layer with RGB glitch split ── -->

  <!-- 5a: MASSIVE red shadow glow behind everything -->
  <g filter="url(#glowMassive)">
    <text x="40" y="232" class="monument" fill="#ff0000" opacity="0.35">franciselegante</text>
  </g>

  <!-- 5b: Solid red offset layer (glitch RGB split - red channel) -->
  <g clip-path="url(#textReveal)">
    <g class="layer-red" filter="url(#glow)">
      <text x="40" y="232" class="monument" fill="#ff0000">franciselegante</text>
    </g>
  </g>

  <!-- 5c: Solid cyan offset layer (glitch RGB split - cyan channel) -->
  <g clip-path="url(#textReveal)">
    <g class="layer-cyan" filter="url(#glow)">
      <text x="40" y="232" class="monument" fill="#5fffff">franciselegante</text>
    </g>
  </g>

  <!-- 5d: Outline only — gold stroke traced -->
  <g clip-path="url(#textReveal)">
    <text x="40" y="232" class="monument" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.45">franciselegante</text>
  </g>

  <!-- 5e: MAIN TEXT — fire gradient fill + glow + glitch shift -->
  <g clip-path="url(#textReveal)">
    <g class="layer-main" filter="url(#glowBig)">
      <text x="40" y="232" class="monument" fill="url(#fireGrad)">franciselegante</text>
    </g>
  </g>

  <!-- 5f: Top highlight stripe on the text (simulates CRT scan reflecting) -->
  <g clip-path="url(#textReveal)" opacity="0.6">
    <rect x="20" y="150" width="1100" height="3" fill="url(#fireVert)">
      <animate attributeName="y" values="150;240;150" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ── LAYER 6: tagline below the name ────────────────────────────────── -->
  <g transform="translate(40, 280)">
    <text class="tagline" fill="#ffaf00" opacity="0">
      backend engineer
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.1s" fill="freeze"/>
    </text>
    <text x="220" class="tagline" fill="#5fffff" opacity="0">·
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.3s" fill="freeze"/>
    </text>
    <text x="240" class="tagline" fill="#ff8700" opacity="0">systems operator
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.4s" fill="freeze"/>
    </text>
    <text x="460" class="tagline" fill="#5fffff" opacity="0">·
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.6s" fill="freeze"/>
    </text>
    <text x="480" class="tagline" fill="#ffd700" opacity="0">multi-tenant saas
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.7s" fill="freeze"/>
    </text>
    <rect x="700" y="-18" width="14" height="22" fill="#ff5f00" class="cursor" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.9s" fill="freeze"/>
    </rect>
  </g>

  <!-- ── LAYER 7: moving scanline overlay ───────────────────────────────── -->
  <g class="scan-overlay" opacity="0.7">
    <line x1="0" y1="0" x2="1400" y2="0" stroke="#ff5f00" stroke-width="1" opacity="0.35"/>
    <line x1="0" y1="2" x2="1400" y2="2" stroke="#ff8700" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="5" x2="1400" y2="5" stroke="#ffaf00" stroke-width="1" opacity="0.1"/>
  </g>

  <!-- ── LAYER 8: right-side decorative code column ─────────────────────── -->
  <g transform="translate(1180, 80)" class="flicker">
    <text x="0" y="0"   class="code-line" fill="#ff8700">const server = express()</text>
    <text x="0" y="18"  class="code-line" fill="#5fffff">app.use(clientResolver)</text>
    <text x="0" y="36"  class="code-line" fill="#87ff00">app.use(auth.middleware)</text>
    <text x="0" y="54"  class="code-line" fill="#ffaf00">app.use('/api', routes)</text>
    <text x="0" y="72"  class="code-line" fill="#ffd700">server.listen(3001)</text>
    <text x="0" y="90"  class="code-line" fill="#ff5f00">[✓] 11 tenants resolved</text>
    <text x="0" y="108" class="code-line" fill="#87ff00">[✓] schema parity OK</text>
    <text x="0" y="126" class="code-line" fill="#5fffff">[✓] PM2 online</text>
    <text x="0" y="144" class="code-line" fill="#ff8700">[✓] API :3001 ready</text>
    <text x="0" y="162" class="code-line" fill="#ffd700">exit 0</text>
  </g>

  <!-- ── LAYER 9: bottom status bar ─────────────────────────────────────── -->
  <g transform="translate(40, 340)">
    <text class="meta-line" fill="#5fffff">[SESSION]</text>
    <text x="90" class="meta-line" fill="#ffffff">francis@vps-5767070</text>
    <text x="290" class="meta-line" fill="#5fffff">[SHELL]</text>
    <text x="360" class="meta-line" fill="#ffffff">zsh 5.8</text>
    <text x="450" class="meta-line" fill="#5fffff">[EDITOR]</text>
    <text x="525" class="meta-line" fill="#ffffff">nvim</text>
    <text x="590" class="meta-line" fill="#5fffff">[TZ]</text>
    <text x="625" class="meta-line" fill="#ffffff">UTC-3</text>
    <text x="695" class="meta-line" fill="#5fffff">[STACK]</text>
    <text x="762" class="meta-line" fill="#ffffff">node · python · mysql · redis · nginx · pm2</text>
  </g>

  <!-- ── LAYER 10: top-right PROD indicator ─────────────────────────────── -->
  <g transform="translate(1280, 30)">
    <rect x="0" y="-14" width="90" height="18" fill="#ff5f00" opacity="0.15" stroke="#ff5f00" stroke-width="1"/>
    <text x="8" y="-1" class="meta-line" fill="#ff5f00">● PROD</text>
  </g>

  <!-- ── LAYER 11: left edge accent bar ─────────────────────────────────── -->
  <rect x="0" y="0" width="4" height="360" fill="url(#fireGrad)"/>

  <!-- ── LAYER 12: bottom edge accent bar ───────────────────────────────── -->
  <rect x="0" y="356" width="1400" height="4" fill="url(#fireGrad)" opacity="0.7"/>
</svg>
